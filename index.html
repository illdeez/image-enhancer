<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0d12">
<title>Enhancer — free AI image upscaler</title>
<meta name="description" content="Free AI image upscaling that runs entirely in your browser. Your photos never leave your device.">
<style>
  :root {
    --bg: #0b0d12;
    --panel: #141824;
    --panel-2: #1b2130;
    --text: #eef1f7;
    --muted: #8b93a7;
    --accent: #7c5cff;
    --accent-2: #4dd8c0;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: dark; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100dvh;
    padding: max(20px, env(safe-area-inset-top)) 16px max(32px, env(safe-area-inset-bottom));
  }
  main { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  header { text-align: center; padding: 16px 0 4px; }
  h1 { font-size: 1.7rem; letter-spacing: -0.02em; }
  h1 .spark {
    background: linear-gradient(120deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { color: var(--muted); font-size: 0.92rem; margin-top: 6px; }

  #drop {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; min-height: 150px; cursor: pointer; text-align: center; padding: 20px;
    background: var(--panel);
    border: 1.5px dashed #333c52; border-radius: var(--radius);
    transition: border-color 0.15s, background 0.15s;
  }
  #drop.hover, #drop:active { border-color: var(--accent); background: var(--panel-2); }
  #drop .icon { font-size: 2rem; }
  #drop .hint { color: var(--muted); font-size: 0.85rem; }
  #drop img { max-width: 100%; max-height: 240px; border-radius: 10px; }

  .controls { display: flex; gap: 12px; align-items: stretch; }
  .seg { display: flex; background: var(--panel); border-radius: 12px; padding: 4px; }
  .seg button {
    border: 0; background: transparent; color: var(--muted); font: inherit;
    padding: 10px 18px; border-radius: 9px; cursor: pointer; font-weight: 600;
  }
  .seg button.on { background: var(--panel-2); color: var(--text); box-shadow: inset 0 0 0 1px #333c52; }
  #go {
    flex: 1; border: 0; border-radius: 12px; font: inherit; font-weight: 700;
    color: #fff; cursor: pointer; padding: 12px;
    background: linear-gradient(120deg, var(--accent), #5a8bff);
  }
  #go:disabled { opacity: 0.4; cursor: not-allowed; }

  #status { background: var(--panel); border-radius: var(--radius); padding: 14px 16px; }
  #barTrack { height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; }
  #bar { height: 100%; width: 0%; border-radius: 3px; transition: width 0.2s;
         background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
  #statusText { display: block; margin-top: 8px; color: var(--muted); font-size: 0.88rem; }
  #status.error #statusText { color: #ff8a80; }

  #results { display: flex; flex-direction: column; gap: 12px; }
  figure { background: var(--panel); border-radius: var(--radius); padding: 10px; }
  figcaption { color: var(--muted); font-size: 0.8rem; font-weight: 600;
               text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  figure img { width: 100%; border-radius: 10px; display: block; }
  #download {
    display: block; text-align: center; text-decoration: none; color: #06251f;
    font-weight: 700; padding: 13px; border-radius: 12px;
    background: linear-gradient(120deg, var(--accent-2), #7ee8a2);
  }
  .saveHint { text-align: center; color: var(--muted); font-size: 0.82rem; }
  footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 8px; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<main>
  <header>
    <h1><span class="spark">✨ Enhancer</span></h1>
    <p class="sub">Free AI upscaling that runs on <em>your</em> device — photos never leave your browser.</p>
  </header>

  <label id="drop" for="file">
    <input type="file" id="file" accept="image/*" hidden>
    <span class="icon" id="dropIcon">🖼️</span>
    <span id="dropText">Tap to choose a photo</span>
    <span class="hint" id="dropHint">or drag &amp; drop one here</span>
  </label>

  <div class="controls">
    <div class="seg" role="radiogroup" aria-label="Upscale factor">
      <button type="button" data-scale="2">2×</button>
      <button type="button" data-scale="4" class="on">4×</button>
    </div>
    <button id="go" disabled>Enhance</button>
  </div>

  <div id="status" hidden>
    <div id="barTrack"><div id="bar"></div></div>
    <span id="statusText"></span>
  </div>

  <section id="results" hidden>
    <figure><figcaption>After</figcaption><img id="after" alt="Enhanced image"></figure>
    <figure><figcaption>Before</figcaption><img id="before" alt="Original image"></figure>
    <a id="download" download="enhanced.png">Download PNG</a>
    <p class="saveHint">On iPhone: long-press the “After” image → Save to Photos</p>
  </section>

  <footer>
    Runs ESRGAN (via <a href="https://upscalerjs.com" rel="noopener">UpscalerJS</a>) locally with WebGL ·
    <a href="https://github.com/illdeez/image-enhancer" rel="noopener">Source</a>
  </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/upscaler@1.0.0/dist/browser/umd/upscaler.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-medium@1.0.0/dist/umd/models/esrgan-medium/src/x2/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-medium@1.0.0/dist/umd/models/esrgan-medium/src/x4/index.min.js"></script>
<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const drop = $('drop'), fileInput = $('file'), go = $('go');
  const status = $('status'), bar = $('bar'), statusText = $('statusText');
  const results = $('results');

  let scale = 4;
  let file = null;
  let busy = false;

  const MODELS = { 2: window.ESRGANMedium2x, 4: window.ESRGANMedium4x };
  // Bigger inputs than this make phone browsers run out of memory at 4x,
  // and iOS Safari caps canvas sizes around 4096px anyway.
  const MAX_SIDE = { 2: 2048, 4: 1024 };
  const upscalers = {};
  const getUpscaler = (s) => (upscalers[s] ||= new Upscaler({ model: MODELS[s] }));

  document.querySelectorAll('.seg button').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.seg button').forEach((b) => b.classList.remove('on'));
      btn.classList.add('on');
      scale = Number(btn.dataset.scale);
    });
  });

  function setFile(f) {
    if (!f || !f.type.startsWith('image/')) return;
    file = f;
    $('dropIcon').hidden = true;
    $('dropHint').textContent = 'Tap to choose a different photo';
    const preview = new Image();
    preview.src = URL.createObjectURL(f);
    preview.onload = () => URL.revokeObjectURL(preview.src);
    $('dropText').replaceChildren(preview);
    results.hidden = true;
    status.hidden = true;
    go.disabled = false;
  }

  fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
  ['dragover', 'dragenter'].forEach((ev) =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add('hover'); }));
  ['dragleave', 'drop'].forEach((ev) =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove('hover'); }));
  drop.addEventListener('drop', (e) => setFile(e.dataTransfer.files[0]));

  function report(text, rate) {
    status.hidden = false;
    status.classList.remove('error');
    statusText.textContent = text;
    if (rate != null) bar.style.width = `${Math.round(rate * 100)}%`;
  }

  async function loadCapped(f, max) {
    const url = URL.createObjectURL(f);
    const img = new Image();
    try {
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
      const w = img.naturalWidth, h = img.naturalHeight;
      const factor = Math.min(1, max / Math.max(w, h));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(w * factor);
      canvas.height = Math.round(h * factor);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const capped = new Image();
      capped.src = canvas.toDataURL('image/png');
      await capped.decode();
      return { capped, resized: factor < 1 };
    } finally {
      URL.revokeObjectURL(url);
    }
  }

  go.addEventListener('click', async () => {
    if (!file || busy) return;
    busy = true;
    go.disabled = true;
    results.hidden = true;
    bar.style.width = '0%';
    try {
      report('Preparing image…', 0);
      const { capped, resized } = await loadCapped(file, MAX_SIDE[scale]);
      $('before').src = capped.src;

      report('Loading AI model… (first run downloads a few MB)', 0);
      const upscaler = getUpscaler(scale);

      const out = await upscaler.upscale(capped, {
        patchSize: 64,
        padding: 2,
        output: 'base64',
        progress: (rate) => report(`Enhancing… ${Math.round(rate * 100)}%`, rate),
      });

      $('after').src = out;
      $('download').href = out;
      results.hidden = false;
      report(`Done — ${capped.naturalWidth}×${capped.naturalHeight} → ` +
             `${capped.naturalWidth * scale}×${capped.naturalHeight * scale}` +
             (resized ? ' (large photo was resized first to fit in memory)' : ''), 1);
    } catch (err) {
      console.error(err);
      status.classList.add('error');
      statusText.textContent =
        `Something went wrong: ${err.message || err}. Try a smaller photo or 2× instead of 4×.`;
    } finally {
      busy = false;
      go.disabled = false;
    }
  });
})();
</script>
</body>
</html>
